version: "2"

sql:
  - engine: "postgresql"
    schema: "./migrations"
    queries: "./internal/storage/postgres/queries"
    gen:
      go:
        package: "sqlc"
        out: "./internal/storage/postgres/gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_db_tags: true
        query_parameter_limit: 0
